<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Of The Week</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
min-height:100vh;
background:url("./background.jpg") no-repeat center center;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* container centered */

.container{
text-align:center;
width:100%;
max-width:1200px;
padding:40px 20px;
}

/* header */

.header{
margin-bottom:50px;
}

.header h1{
font-size:48px;
font-weight:600;
}

.week{
margin-top:8px;
opacity:.8;
}

/* students */

.students{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
flex-wrap:wrap;
margin-top:40px;
}

.student{
text-align:center;
transition:.3s;
}

.student:hover{
transform:translateY(-10px);
}

/* avatars */

.avatar{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid rgba(255,255,255,.2);
box-shadow:0 15px 35px rgba(0,0,0,.25);
background:white;
}

.main{
width:180px;
height:180px;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* label */

.label{
margin-top:15px;
padding:8px 18px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.2);
font-size:13px;
display:inline-block;
}

/* name */

.name{
margin-top:8px;
font-weight:600;
}

/* footer */

.footer{
margin-top:50px;
opacity:.7;
font-size:14px;
}

/* responsive */

@media(max-width:768px){

.header h1{
font-size:34px;
}

.avatar{
width:110px;
height:110px;
}

.main{
width:140px;
height:140px;
}

.students{
gap:25px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Student of The Week</h1>
<div class="week">Week 1 — Introduction to Programming</div>
</div>

<div class="students">

<div class="student">
<div class="avatar">
<img src="https://i.pravatar.cc/300?img=5">
</div>
<div class="label">Most Active</div>
<div class="name">Sara Ali</div>
</div>

<div class="student">
<div class="avatar main">
<img src="https://i.pravatar.cc/300?img=12">
</div>
<div class="label">Student of Week</div>
<div class="name">Ahmed Mohamed</div>
</div>

<div class="student">
<div class="avatar">
<img src="https://i.pravatar.cc/300?img=7">
</div>
<div class="label">Most Improved</div>
<div class="name">Omar Khaled</div>
</div>

<div class="student">
<div class="avatar">
<img src="https://i.pravatar.cc/300?img=9">
</div>
<div class="label">Creative Thinker</div>
<div class="name">Mariam Hassan</div>
</div>

<div class="student">
<div class="avatar">
<img src="https://i.pravatar.cc/300?img=11">
</div>
<div class="label">Best Problem Solver</div>
<div class="name">Youssef Ahmed</div>
</div>

</div>

<div class="footer">
eYouth — Digital Egypt Youth
</div>

</div>

</body>

</html>
